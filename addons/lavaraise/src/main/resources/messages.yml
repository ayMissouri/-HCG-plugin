# Messages for the Lava Raise addon (includes the volcano feature).
# Base 'general.*' keys are provided by HCGplugin.
lavaraise:
  rising-broadcast: "&4The lava has started rising to Y={y}"
  reached-broadcast: "&4The lava has reached Y={y}"
  receding-broadcast: "&6The lava is receding..."
  gone-broadcast: "&aThe lava is gone."
  gone-repeat-broadcast: "&aThe lava is gone"
  enabled: "&aLava raise enabled, the lava will rise at {time}."
  already-enabled: "&eLava raise is already enabled."
  disabled-draining: "&aLava raise disabled, draining the lava now."
  disabled: "&aLava raise disabled."
  not-enabled: "&eLava raise is not enabled."
  draining-now: "&aDraining the lava now."
  no-event: "&eNo lava event is running."
  invalid-time: "&c'{input}' is not a time, use ticks (0-23999), HH:MM, or noon/midnight/..."
  start-set: "&aStart time set to {time}."
  end-set: "&aEnd time set to {time}."
  duration-set: "&aRise/drain duration set to {seconds}s."
  maxy-set: "&aMaximum level set to Y={y}."
  water-set: "&aWater replacement turned {state}."
  blocks-set: "&aBurning of player-placed blocks turned {state}."
  mobs-set: "&aMob damage turned {state}."
  purge-start: "&6Purging REAL lava blocks in the border region up to Y={y}"
  purge-busy: "&cCan't purge while an event or another purge is running."
  purge-complete: "&aLava purge complete, removed {count} lava blocks."
  status-state: "&6Lava raise is {state}."
  status-settings: "&6Rises at {start}, drains at {end}, {seconds}s travel, max Y={y}, water {water}."

volcano:
  center-set: "&aVolcano center set to {x}, {y}, {z} ({world})."
  no-center: "&cNo center set, use /volcano setcenter first."
  already-erupting: "&eThe volcano is already erupting."
  not-erupting: "&eThe volcano isn't erupting."
  duration-set: "&aDefault eruption duration set to {seconds}s."
  radius-set: "&aShake radius set to {blocks} blocks."
  shake-set: "&aScreen shake turned {state}."
  status: "&6Volcano is {state}. Center: {center}. Default duration: {seconds}s."
  status-schedule-on: "&6Erupts daily at {time}."
  status-schedule-off: "&6Scheduled eruption: off (manual only)."
  schedule-set: "&aThe volcano will now erupt daily at {time}."
  schedule-off: "&aVolcano schedule disabled, manual eruptions only."
  schedule-no-center: "&eNote: no center is set yet, the schedule won't fire until you run /volcano setcenter."
  invalid-time: "&c'{input}' is not a time, use ticks (0-23999), HH:MM, or noon/midnight/..."
  invalid-seconds: "&c'{input}' is not a number of seconds."
