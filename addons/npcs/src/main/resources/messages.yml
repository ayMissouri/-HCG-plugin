# Messages for the NPCs addon. Base 'general.*' keys are provided by HCGplugin.
npc:
  unavailable: "&cNPCs are not available, this server version isn't supported."
  not-found: "&cNo NPC named '{name}'. See /npc list."
  already-exists: "&cAn NPC named '{name}' already exists."
  invalid-name: "&cNPC names must be 1-32 letters, numbers, _ or -."
  created: "&aNPC '{name}' created at your location. Give it a skin with /npc skin {name} <player>."
  removed: "&aNPC '{name}' removed."
  list-empty: "&eNo NPCs yet, create one with /npc create <name>."
  list-header: "&6NPCs ({count}):"
  list-entry: "&e{name} &7- {world} {x}, {y}, {z}"
  info-header: "&6--- NPC '{name}' ---"
  info-location: "&6Location: &e{world} {x}, {y}, {z}"
  info-appearance: "&6Display name: &e{displayname}&6, skin: &e{skin}&6, glowing: &e{glowing}"
  info-behavior: "&6Turn to player: &e{turn}&6, collision: &e{collidable}&6, tab: &e{tab}&6, cooldown: &e{cooldown}&6, actions: &e{actions}"
  skin-fetching: "&7Fetching skin for '{name}'..."
  skin-set: "&aSkin of '{name}' set from {source}."
  skin-reset: "&aSkin of '{name}' reset to default."
  skin-failed: "&cSkin fetch failed: {reason}"
  displayname-set: "&aDisplay name of '{name}' set to '{displayname}&a'."
  displayname-hidden: "&aDisplay name of '{name}' hidden."
  equipment-set: "&aSet {slot} of '{name}' to {item}."
  equipment-cleared: "&aCleared {slot} of '{name}'."
  equipment-none: "&e'{name}' has no equipment."
  equipment-header: "&6Equipment of '{name}':"
  equipment-entry: "&e{slot}: &7{item}"
  invalid-slot: "&cUnknown slot '{input}'. Slots: mainhand, offhand, head, chest, legs, feet."
  glowing-set: "&aGlow of '{name}' set to {color}."
  glowing-off: "&aGlow of '{name}' turned off."
  invalid-color: "&c'{input}' is not a color. Use red, gold, aqua, dark_purple, ... or off."
  collidable-set: "&aCollision for '{name}' turned {state}."
  showintab-set: "&aTab list visibility for '{name}' turned {state}."
  turn-set: "&aTurn-to-player for '{name}' turned {state}{distance}."
  moved: "&a'{name}' moved to your location."
  rotated: "&a'{name}' now faces yaw {yaw}, pitch {pitch}."
  teleported: "&aTeleported to '{name}'."
  world-not-loaded: "&cThe world of '{name}' ({world}) is not loaded."
  cooldown-set: "&aInteraction cooldown for '{name}' set to {seconds}s."
  invalid-trigger: "&cUnknown trigger '{input}'. Triggers: left_click, right_click, any_click."
  invalid-action-type: "&cUnknown action '{input}'. Actions: message, player_command, console_command, sound, wait."
  action-added: "&aAdded {trigger} action #{index} to '{name}': &e{action}"
  action-removed: "&aRemoved {trigger} action #{index} from '{name}'."
  action-invalid-index: "&cNo action #{input}, '{name}' has {count} {trigger} action(s)."
  actions-cleared: "&aCleared {count} {trigger} action(s) of '{name}'."
  actions-empty: "&e'{name}' has no {trigger} actions."
  actions-header: "&6{trigger} actions of '{name}' ({count}):"
  actions-entry: "&e#{index} &7{action}"
