# Messages for the Hunger Games addon. Base 'general.*' keys are provided by HCGplugin.
hungergames:
  spawn-added: "&aSpawn #{index} added at {x}, {y}, {z} ({world})."
  spawn-removed: "&aRemoved spawn #{index}."
  spawn-invalid-index: "&cNo spawn #{input}, there are {count} spawn(s)."
  spawns-cleared: "&aCleared {count} spawn(s)."
  no-spawns: "&cNo spawns set, use /hungergames addspawn first."
  spawns-header: "&6Spawns ({count}):"
  spawns-entry: "&6#{index}: &e{x}, {y}, {z} ({world})"
  spawn-world-missing: "&cSpawn #{index}'s world is not loaded."
  too-many-players: "&cThere are {players} players online but only {spawns} spawn(s), add more spawns first."
  scattered: "&aScattered {players} player(s) across {spawns} spawn(s)."
  center-set: "&aBorder center set to {x}, {z} ({world})."
  no-center: "&cNo border center set, use /hungergames setcenter first."
  already-running: "&eA game is already running."
  not-running: "&eNo game is running."
  started: "&aGame started, the border expands in {seconds}s."
  stopped: "&aGame sequence stopped, the border has been reset."
  value-set: "&a{setting} set to {value}."
  countdown-title: "&c{seconds}"
  countdown-subtitle: "&7The games begin in..."
  begin-title: "&6&lThe games have begun!"
  begin-subtitle: "&eThe border is expanding"
  begin-broadcast: "&6The games have begun!"
  shrink-warning: "&eThe border shrinks in {seconds}s!"
  shrink-title: "&c&lThe border is shrinking!"
  shrink-subtitle: "&eStage {stage}/{stages}."
  shrink-broadcast: "&cThe border is shrinking."
  final-title: "&4&lFinal zone!"
  final-subtitle: "&eThe border has reached {size} blocks"
  final-broadcast: "&4The border has reached its final size."
  status-state: "&6Hunger Games: {state}."
  status-border: "&6Center: {center}. Border: start {start} -> expand to {expanded} over {expandseconds}s -> final {final}."
  status-stages: "&6{stages} stage(s), {hold}s between stages, {shrink}s per shrink, {countdown}s starting countdown."
  status-spawns: "&6{count} spawn(s) set."
