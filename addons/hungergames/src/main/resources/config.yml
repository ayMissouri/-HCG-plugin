hungergames:
  # Spawn points set with /hungergames addspawn, stored as "world;x;y;z;yaw;pitch".
  spawns: []
  # Seconds of on-screen title countdown before the border expands.
  countdown-seconds: 60
  border:
    # Size (blocks across) the border starts at when the game begins.
    start-size: 100
    # The border quickly expands to this size after the countdown.
    expanded-size: 1000
    # The border ends up this size after the last shrink stage.
    final-size: 30
    # Seconds the initial expansion takes.
    expand-seconds: 15
  # Number of shrink stages after the expansion (sizes step evenly down to final-size).
  stages: 5
  # Seconds the border holds still between stages.
  stage-hold-seconds: 180
  # Seconds each stage's shrink takes.
  stage-shrink-seconds: 60
