# - Color/format codes use & (e.g. &a green, &c red, &6 gold, &l bold, &o italic).
# - {placeholders} are filled in by the plugin, keep them where you want the value.

general:
  only-players: "&cOnly players can use this command."
  player-not-online: "&cPlayer '{player}' is not online."
  not-a-number: "&c'{input}' is not a number."
  not-positive: "&c'{input}' is not a positive number."
  missing-argument: "&cMissing <{name}> argument."
  console-needs-player: "&cConsole must specify a player."
  value-range: "&cValue must be between {min} and {max}."

healthdecay:
  start-broadcast: "&4Health decay has begun!"
  stop-broadcast: "&aHealth decay has been disabled."
  kill-broadcast: "&c{killer} &6took &c{victim}&6's life, everyone's health has been restored!"
  bottomed-out: "&4Health has reached {hearts} hearts."
  already-running: "&eHealth decay is already running." 
  not-running: "&eHealth decay is not running."
  restored: "&aEveryone's health has been restored."
  interval-set: "&aDecay interval set to {seconds}s."
  amount-set: "&aDecay amount set to {hearts} heart(s) per tick."
  status-state: "&6Health decay is {state}."
  status-health: "&6Current max health: {current} hearts (min: {floor})"
  status-rate: "&6Losing {amount} heart(s) every {seconds}s."

randomdrops:
  enabled-broadcast: "&dRandom drops enabled ({mode} mode)!"
  disabled-broadcast: "&aRandom drops disabled."
  already-enabled: "&eRandom drops are already enabled."
  not-enabled: "&eRandom drops are not enabled."
  status: "&6Random drops are {state} in {mode} mode, random enchants {enchants}, mob drops {mobs}."
