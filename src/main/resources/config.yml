# Whether the decay game mode is running. Toggled by /healthdecay on|off.
enabled: false

decay:
  # Seconds between each decay tick.
  interval-seconds: 60
  # Hearts lost per tick.
  amount-hearts: 0.5
  # Health will never drop below this.
  minimum-hearts: 3.0
  # The health everyone is restored to.
  maximum-hearts: 10.0

kill:
  # This is the window of time in which a player can be credited for a kill.
  credit-window-seconds: 45

lava-raise:
  enabled: false
  # World-clock day ticks (0-23999). 0 = 06:00, 6000 = noon, 18000 = midnight.
  start-time: 0
  end-time: 12000
  # Seconds for the lava to travel from bedrock to max-y (and back down).
  rise-duration-seconds: 300
  # The lava stops rising at this Y level.
  max-y: 62
  # When true, oceans/water look flooded too and don't protect from burning.
  replace-water: false
  # When true, PLAYER-PLACED burnable blocks (wood, wool, leaves, ...) burn as the lava passes them.
  burn-placed-blocks: true
  # When true, mobs in the lava burn and take damage like players.
  damage-mobs: false
  # The lava is client-side packets only (no real blocks).
  # blocks-per-tick: positions scanned and sent per tick across all players.
  # max-region: region cap in blocks across.
  # render-radius: chunks around each player that get the lava visual.
  # Automatically capped at the server view distance.
  blocks-per-tick: 40000
  max-region: 512
  render-radius: 32

volcano:
  # Default eruption length in seconds.
  duration-seconds: 20
  # Whether eruptions shake nearby players' screens.
  shake-enabled: false
  # Players within this many blocks of the center get screen shake.
  shake-radius: 150
  # Daily scheduled eruption at a world-clock time.
  schedule-enabled: false
  erupt-time: 13000

random-drops:
  enabled: false
  # dynamic = fresh random drop on every break.
  # static = each block type always drops the same random item.
  mode: dynamic
  # When true, every drop gets 1-3 random enchantments at random levels.
  enchanted: false
  # When true, mobs also drop a random item instead of their normal loot.
  mobs: false
